name: _build-release

on:
  workflow_call:
    inputs:
      workspace:
        description: "If true, build the whole workspace. Overrides include-bench-driver."
        type: boolean
        default: false
      include-bench-driver:
        description: "Build arbreth-bench as well (always in a separate cargo invocation)."
        type: boolean
        default: false
      artifact-name:
        description: "Name for the uploaded release-binaries artifact"
        type: string
        default: "release-binaries"
      ref:
        description: "Git ref to check out (defaults to the triggering ref)"
        type: string
        default: ""

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build release binaries
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          submodules: recursive
      - uses: dtolnay/rust-toolchain@1.93
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: arbreth-release-build
      - name: Cargo build
        run: |
          set -euo pipefail
          if [[ "${{ inputs.workspace }}" == "true" ]]; then
            cargo build --release --workspace
          else
            cargo build --release -p arb-reth --bin arb-reth
            if [[ "${{ inputs.include-bench-driver }}" == "true" ]]; then
              cargo build --release -p arb-bench --bin arbreth-bench
            fi
          fi
      - name: Upload release binaries
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact-name }}
          path: |
            target/release/arb-reth
            target/release/arbreth-bench
          if-no-files-found: warn
          retention-days: 7
