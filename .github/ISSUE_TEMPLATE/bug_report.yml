name: Bug Report
description: Report a bug in ArbReth
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How to reproduce the behavior.
      placeholder: |
        1. Run '...'
        2. Observe '...'
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: ArbReth Version
      description: Output of `arb-reth --version` or git commit hash.
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Platform
      description: e.g. Ubuntu 24.04, macOS 15.3
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Any relevant log output or error messages.
      render: shell
    validations:
      required: false
