name: bench-pr

on:
  pull_request:
    paths:
      - "crates/**"
      - "bin/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "bench/corpus/**"
      - ".github/workflows/bench-pr.yml"
      - ".github/workflows/_build-release.yml"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    uses: ./.github/workflows/_build-release.yml
    with:
      artifact-name: bench-pr-binaries

  abba:
    name: abba pr-gate
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
      - uses: actions/download-artifact@v4
        with:
          name: bench-pr-binaries
          path: target/release
      - name: Make binaries executable
        run: chmod +x target/release/arbreth-bench target/release/arb-reth
      - name: Run ABBA over PR-gate preset
        run: |
          target/release/arbreth-bench abba \
            --preset pr-gate \
            --iterations 3 \
            --tolerance-pct 5.0 \
            --bootstrap-iters 10000 \
            --out target/bench/abba \
            --markdown-out target/bench/abba/summary.md
      - name: Upload ABBA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: abba-results
          path: target/bench/abba
          retention-days: 30
      - name: Comment ABBA summary on PR
        if: github.event_name == 'pull_request' && always()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'target/bench/abba/summary.md';
            if (!fs.existsSync(path)) {
              core.warning('no abba summary file');
              return;
            }
            const body = fs.readFileSync(path, 'utf8');
            const issue_number = context.payload.pull_request.number;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body: `### arb-bench (PR-gate ABBA)\n\n${body}`,
            });
