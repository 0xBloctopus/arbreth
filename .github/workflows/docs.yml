name: docs

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@1.93

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Build Vocs site
      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Build Vocs
        working-directory: docs
        run: npm run build

      # Build and inject rustdoc
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y clang libclang-dev cmake

      - name: Build rustdoc
        run: |
          RUSTDOCFLAGS="-A rustdoc::broken-intra-doc-links" \
            cargo doc --workspace --no-deps
          mkdir -p docs/docs/dist/rustdoc
          cp -r target/doc/. docs/docs/dist/rustdoc/

      # Add .nojekyll to prevent GitHub Pages from ignoring _-prefixed files
      - name: Prepare for Pages
        run: |
          touch docs/docs/dist/.nojekyll
          echo "arbreth.rs" > docs/docs/dist/CNAME

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/docs/dist

  deploy:
    name: deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
