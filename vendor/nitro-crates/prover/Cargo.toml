[package]
name = "prover"
version = "0.1.0"
edition = "2021"
license = "BUSL-1.1"

[dependencies]
arbutil = { path = "../arbutil" }
bincode = "1.3.3"
bitvec = { version = "1.0.0", features = ["serde"] }
brotli = { package = "nitro-brotli", path = "../brotli" }
derivative = "2.2.0"
digest = "0.10.7"
enum-iterator = "2.0.1"
eyre = "0.6"
fnv = "1.0.7"
hex = { version = "0.4.3", default-features = false }
lazy_static = "1"
libc = "0.2"
lru = "0.16.3"
nom = "7.0.0"
num = "0.4"
num-derive = "0.4.1"
num-traits = "0.2.17"
once_cell = "1.19.0"
parking_lot = "0.12"
rayon = { version = "1.5.1", optional = true }
rustc-demangle = "0.1.21"
serde = { version = "1", features = ["derive", "rc"] }
serde_json = "1"
serde_with = { version = "3.8.1", features = ["base64"] }
sha2 = "0.10"
sha3 = "0.10"
smallvec = { version = "1.10.0", features = ["serde"] }
static_assertions = "1.1.0"
structopt = "0.3.26"
validation = { path = "../validation" }
wasmer-types = { path = "../../wasmer/lib/types" }
wasmparser = "0.121"
wat = "1.0.56"

[build-dependencies]
forward = { path = "../forward" }

[lib]
name = "prover"
crate-type = ["lib"]

[features]
default = ["rayon"]
counters = []
rayon = ["dep:rayon"]
