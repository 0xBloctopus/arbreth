name: spec-tests

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    uses: ./.github/workflows/_build-release.yml
    with:
      artifact-name: spec-tests-binaries

  spec:
    name: arb-spec-tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@1.93
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - uses: actions/download-artifact@v4
        with:
          name: spec-tests-binaries
          path: target/release
      - name: Make arb-reth executable
        run: chmod +x target/release/arb-reth
      - name: Run spec tests
        env:
          ARB_SPEC_BINARY: ${{ github.workspace }}/target/release/arb-reth
          ARB_SPEC_REQUIRE_BINARY: "1"
        run: cargo nextest run -p arb-spec-tests --profile ci
