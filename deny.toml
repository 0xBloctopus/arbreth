[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
]
all-features = true

[advisories]
yanked = "warn"
ignore = [
    "RUSTSEC-2025-0141", # bincode - transitive via reth
    "RUSTSEC-2024-0388", # derivative - transitive via reth
    "RUSTSEC-2025-0057", # fxhash - transitive via reth
    "RUSTSEC-2024-0436", # paste - transitive via reth
    "RUSTSEC-2026-0041", # brotli decompression - transitive
    "RUSTSEC-2024-0370", # proc-macro-error - transitive via reth
    "RUSTSEC-2026-0049", # rustls-webpki CRL - transitive via reth
    "RUSTSEC-2026-0067", # tar unpack_in symlink - transitive via reth
    "RUSTSEC-2026-0068", # tar PAX size headers - transitive via reth
    "RUSTSEC-2021-0139", # ansi_term unmaintained - transitive via vendored wasmer
    "RUSTSEC-2024-0375", # atty unmaintained - transitive via vendored wasmer
    "RUSTSEC-2020-0168", # mach unmaintained - transitive via vendored wasmer
    "RUSTSEC-2026-0098", # rustls-webpki URI name constraints - transitive via reth
    "RUSTSEC-2026-0099", # rustls-webpki wildcard name constraints - transitive via reth
    "RUSTSEC-2026-0105", # core2 unmaintained - transitive via reth/discv5/multihash
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "0BSD",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "BUSL-1.1",
    "CC0-1.0",
    "MPL-2.0",
    "OpenSSL",
    "CDLA-Permissive-2.0",
]

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "arb-primitives"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "arb-chainspec"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "arb-storage"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "arb-evm"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "arb-precompiles"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "arb-node"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "arb-payload"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "arb-rpc"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "arb-txpool"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "arb-stylus"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "arbos"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "arb-reth"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "gen-genesis"

[[licenses.clarify]]
crate = "arbutil"
expression = "BUSL-1.1"
license-files = []

[[licenses.clarify]]
crate = "brotli"
expression = "BUSL-1.1"
license-files = []

[[licenses.clarify]]
crate = "prover"
expression = "BUSL-1.1"
license-files = []

[[licenses.clarify]]
crate = "validation"
expression = "BUSL-1.1"
license-files = []

[[licenses.clarify]]
crate = "forward"
expression = "BUSL-1.1"
license-files = []

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = [
    "https://github.com/paradigmxyz/reth",
    "https://github.com/OffchainLabs/nitro",
    "https://github.com/OffchainLabs/wasmer",
]
