name: spec-tests

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  spec:
    name: arb-spec-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@1.93
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      # Execution fixtures need a release binary spawned per-fixture.
      # Without ARB_SPEC_BINARY the runner silently skips them.
      - name: Build arb-reth (release)
        run: cargo build --release -p arb-reth
      - name: Run spec tests
        env:
          ARB_SPEC_BINARY: ${{ github.workspace }}/target/release/arb-reth
          ARB_SPEC_REQUIRE_BINARY: "1"
        run: cargo nextest run -p arb-spec-tests --profile ci
