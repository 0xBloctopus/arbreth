[package]
name = "arb-stylus-fixture-fill"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Rewrite Stylus fixture messages as kind=3 sub=4 SignedL2Tx envelopes with brotli-compressed deploy bodies."

[[bin]]
name = "arb-stylus-fixture-fill"
path = "src/main.rs"

[dependencies]
alloy-primitives = { workspace = true, features = ["std", "k256"] }
alloy-consensus = { workspace = true, features = ["std", "k256"] }
alloy-eips = { workspace = true, features = ["std"] }
alloy-rlp = { workspace = true }
alloy-sol-types = { workspace = true }
arbos = { workspace = true }
arb-spec-tests = { workspace = true }
arb-test-harness = { workspace = true }

base64 = "0.22"
brotli = { workspace = true }
serde_json = { workspace = true }
walkdir = "2"
wat = "1"
anyhow = { workspace = true }
hex = { workspace = true }
k256 = { version = "0.13", default-features = false, features = ["ecdsa"] }

[lints]
workspace = true
